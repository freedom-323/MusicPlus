<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>音樂節奏反應遊戲</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none; /* 防止頻繁點擊選中文字 */
        }
        #status { font-size: 24px; margin-bottom: 20px; }
        #score { font-size: 48px; color: #ff4757; }
        #timer { font-size: 20px; color: #2f3542; }
        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #2ed573;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="status">準備好了嗎？</div>
    <div id="score">分數: 0</div>
    <div id="timer">剩餘時間: 60s</div>
    <br>
    <button id="start-btn" onclick="startGame()">開始遊戲</button>

    <!-- 請更換為你想使用的音樂 URL -->
    <audio id="bgm" loop src="https://dn721809.ca.archive.org/0/items/PachelbelCanonInDMajor/Pachelbel_%20Canon%20-%20In%20D%20Major.mp3"></audio>

    <script>
        let score = 0;
        let timeLeft = 60;
        let isPlaying = false;
        let gameActive = false;
        const audio = document.getElementById('bgm');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        function startGame() {
            score = 0;
            timeLeft = 60;
            gameActive = true;
            scoreDisplay.innerText = "分數: 0";
            startBtn.style.display = "none";
            statusDisplay.innerText = "注意聽音樂！";

            // 啟動倒計時
            const timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = `剩餘時間: ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);

            // 啟動音樂隨機停啟邏輯
            toggleMusic();
        }

        function toggleMusic() {
            if (!gameActive) return;

            const isCurrentlyPlaying = !audio.paused;
            
            if (isCurrentlyPlaying) {
                audio.pause();
                statusDisplay.innerText = "安靜... (點擊扣分)";
            } else {
                audio.play().catch(e => console.log("需點擊後播放"));
                statusDisplay.innerText = "音樂中！ (點擊加分)";
            }

            // 隨機在 2 到 5 秒之間切換狀態
            const nextChange = Math.random() * 3000 + 2000;
            setTimeout(toggleMusic, nextChange);
        }

        // 監聽螢幕任一處點擊
        document.body.addEventListener('mousedown', () => {
            if (!gameActive) return;

            if (!audio.paused) {
                score++;
                document.body.style.backgroundColor = "#e1ffed"; // 點對變綠色
            } else {
                score--;
                document.body.style.backgroundColor = "#ffe1e1"; // 點錯變紅色
            }
            
            scoreDisplay.innerText = `分數: ${score}`;
            
            // 短暫延遲後恢復背景色
            setTimeout(() => {
                document.body.style.backgroundColor = "#f0f0f0";
            }, 100);
        });

        function endGame() {
            gameActive = false;
            audio.pause();
            alert(`遊戲結束！你的最終得分是: ${score}`);
            startBtn.style.display = "block";
            startBtn.innerText = "再玩一次";
            statusDisplay.innerText = "遊戲結束";
        }
    </script>
</body>
</html>
