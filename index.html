<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad 三機協作挑戰</title>
    <!-- 修正 PeerJS 引用 -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #1a1a1a; color: #fff; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }
        button { padding: 20px; font-size: 1.2rem; margin: 10px; border-radius: 15px; border: none; background: #007bff; color: white; width: 260px; font-weight: bold; }
        input { padding: 15px; font-size: 1.2rem; margin: 8px; width: 240px; border-radius: 10px; border: 1px solid #444; background: #333; color: #fff; text-align: center; }
        #game-area { width: 80%; height: 40vh; background: #444; display: flex; justify-content: center; align-items: center; border-radius: 30px; font-size: 2.5rem; transition: 0.1s; user-select: none; }
        #debug { position: fixed; bottom: 0; font-size: 11px; color: #888; width: 100%; padding: 5px; background: rgba(0,0,0,0.5); }
        .highlight { background: #ffcc00 !important; color: #000; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="menu" class="screen active">
        <h1>iPad 協作遊戲</h1>
        <input type="text" id="rid" placeholder="房間名稱 (如: mygame)">
        <input type="password" id="rpw" placeholder="密碼">
        <button onclick="unlockAndStart()">進入頻道</button>
        <p style="color: #888;">提示：房主先進入，隊員後進入</p>
    </div>

    <div id="lobby" class="screen">
        <h2 id="room-display">等待隊員...</h2>
        <p style="font-size: 3rem;">人數: <span id="count">1</span> / 3</p>
        <p id="role">正在同步...</p>
        <button id="startBtn" onclick="sendAll('start')" style="display:none; background:#28a745;">全員到齊，開始！</button>
    </div>

    <div id="game" class="screen">
        <div id="timer" style="font-size: 2rem; color: #ff4444;">60s</div>
        <div style="font-size:2rem; margin: 20px;">分數: <span id="score">0</span></div>
        <div id="game-area" onpointerdown="tap()">準備...</div>
    </div>

    <div id="debug">狀態: 等待初始化</div>
    
    <!-- 使用一個標準的短音效 -->
    <audio id="snd" src="https://assets.mixkit.co" preload="auto"></audio>

    <script>
        let p, conns = new Map(), isH = false, sc = 0, active = false, lastSignal = 0;
        const log = m => document.getElementById('debug').innerText = "狀態: " + m;

        // iOS Safari 必須在使用者點擊按鈕時觸發音效解鎖
        function unlockAndStart() {
            const audio = document.getElementById('snd');
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
                start();
            }).catch(e => {
                console.log("Audio auto-play blocked", e);
                start();
            });
        }

        function start() {
            const rid = document.getElementById('rid').value;
            const rpw = document.getElementById('rpw').value;
            if(!rid) return alert("請輸入頻道名稱");
            
            const roomId = `v3-room-${rid}-${rpw}`;
            log("正在連線...");
            
            p = new Peer(); // 使用 PeerJS 預設伺服器

            p.on('open', (id) => {
                log("已取得 ID，正在搜尋房間...");
                const c = p.connect(roomId);
                
                const timeout = setTimeout(() => {
                    log("沒人開房，你已成為房主");
                    p.destroy();
                    setupHost(roomId);
                }, 3000);

                c.on('open', () => {
                    clearTimeout(timeout);
                    log("已成功加入");
                    isH = false;
                    addConn(c);
                    go('lobby');
                });
            });

            p.on('error', (err) => {
                if(err.type === 'unavailable-id') setupHost(roomId);
                else log("錯誤: " + err.type);
            });
        }

        function setupHost(roomId) {
            p = new Peer(roomId);
            p.on('open', () => {
                log("房主模式");
                isH = true;
                document.getElementById('role').innerText = "你是房主 (主控端)";
                document.getElementById('room-display').innerText = "房間: " + document.getElementById('rid').value;
                go('lobby');
                p.on('connection', addConn);
            });
        }

        function addConn(c) {
            conns.set(c.peer, c);
            updateLobby();
            c.on('data', d => {
                if(d === 'start') run();
                if(d === 'ding') flash();
                if(typeof d === 'number') { sc = d; document.getElementById('score').innerText = sc; }
            });
            c.on('close', () => { conns.delete(c.peer); updateLobby(); });
        }

        function updateLobby() {
            const n = conns.size + 1;
            document.getElementById('count').innerText = n;
            if(isH) document.getElementById('startBtn').style.display = (n >= 1) ? 'block' : 'none';
        }

        function sendAll(m) {
            conns.forEach(c => c.send(m));
            if(isH && m === 'start') run();
        }

        function run() {
            sc = 0; active = true; 
            document.getElementById('score').innerText = "0";
            go('game');
            if(isH) {
                let timeLeft = 60;
                const timer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft + "s";
                    if(timeLeft <= 0) { 
                        active = false; 
                        clearInterval(timer);
                        alert("遊戲結束！總分: " + sc); 
                        location.reload(); 
                    }
                }, 1000);
                hostLoop();
            }
        }

        function hostLoop() {
            if(!active) return;
            const delay = 1500 + Math.random() * 2000;
            setTimeout(() => {
                if(!active) return;
                const clients = Array.from(conns.values());
                const totalPlayers = clients.length + 1;
                const randomIndex = Math.floor(Math.random() * totalPlayers);

                if(randomIndex === 0) flash(); // 房主自己閃
                else clients[randomIndex-1].send('ding'); // 叫別人閃
                
                hostLoop();
            }, delay);
        }

        function flash() {
            const audio = document.getElementById('snd');
            audio.currentTime = 0;
            audio.play();
            lastSignal = Date.now();
            const area = document.getElementById('game-area');
            area.innerText = "快點擊！";
            area.classList.add('highlight');
            setTimeout(() => {
                area.classList.remove('highlight');
                area.innerText = "等待中...";
            }, 500);
        }

        function tap() {
            if(!active) return;
            const now = Date.now();
            if(now - lastSignal < 800) {
                sc++;
                lastSignal = 0; // 防止連點
            } else {
                sc = Math.max(0, sc - 1);
            }
            document.getElementById('score').innerText = sc;
            sendAll(sc); // 同步分數
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
