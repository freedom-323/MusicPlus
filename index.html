<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad 三機遊戲</title>
    <!-- 使用特定穩定版本的 PeerJS -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: -apple-system; text-align: center; background: #000; color: #fff; margin: 0; }
        .screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }
        button { padding: 20px; font-size: 1.2rem; margin: 10px; border-radius: 12px; border: none; background: #007bff; color: white; width: 260px; }
        input { padding: 15px; font-size: 1.2rem; margin: 8px; width: 240px; border-radius: 8px; border: 1px solid #444; background: #222; color: #fff; text-align: center; }
        #game-area { width: 85%; height: 50vh; background: #333; display: flex; justify-content: center; align-items: center; border-radius: 20px; font-size: 2rem; }
        #debug { position: fixed; bottom: 0; font-size: 12px; color: #ffcc00; width: 100%; background: rgba(0,0,0,0.8); padding: 5px; }
    </style>
</head>
<body>

    <div id="menu" class="screen active">
        <h1>iPad 協作遊戲</h1>
        <input type="text" id="rid" placeholder="頻道名稱">
        <input type="password" id="rpw" placeholder="密碼">
        <button onclick="start()">進入頻道</button>
        <p>請確保三部機都開著這個畫面</p>
    </div>

    <div id="lobby" class="screen">
        <h2 id="room-name">準備中</h2>
        <p style="font-size: 2rem;">人數: <span id="count">1</span> / 3</p>
        <p id="role">正在連線...</p>
        <button id="startBtn" onclick="sendAll('start')" style="display:none; background:#28a745;">開始</button>
    </div>

    <div id="game" class="screen">
        <div id="timer">60s</div>
        <div style="font-size:2rem">分數: <span id="score">0</span></div>
        <div id="game-area" onclick="tap()">點擊此處</div>
    </div>

    <div id="debug">狀態: 等待操作</div>
    <audio id="snd" src="https://actions.google.com"></audio>

    <script>
        let p, conns = new Map(), isH = false, sc = 0, active = false, last = 0;
        const log = m => document.getElementById('debug').innerText = "狀態: " + m;

        function start() {
            const id = `room-${document.getElementById('rid').value}-${document.getElementById('rpw').value}`;
            log("正在連線至伺服器...");
            
            // 強制使用 HTTPS 的 443 端口，這是 iPad Safari 成功的關鍵
            p = new Peer({
                host: '0.peerjs.com',
                port: 443,
                secure: true,
                debug: 3,
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });

            p.on('open', (myId) => {
                log("已連網，嘗試加入...");
                const c = p.connect(id);
                const t = setTimeout(() => {
                    if (conns.size === 0) {
                        log("沒人開房，自立為房主...");
                        p.destroy();
                        setupHost(id);
                    }
                }, 3000);

                c.on('open', () => {
                    clearTimeout(t);
                    log("成功加入頻道");
                    isH = false;
                    addConn(c);
                    go('lobby');
                });
            });

            p.on('error', (e) => log("錯誤: " + e.type));
        }

        function setupHost(id) {
            p = new Peer(id, { host: '0.peerjs.com', port: 443, secure: true });
            p.on('open', () => {
                log("房主模式已啟動");
                isH = true;
                document.getElementById('role').innerText = "你是房主";
                go('lobby');
                p.on('connection', addConn);
            });
        }

        function addConn(c) {
            conns.set(c.peer, c);
            up();
            c.on('data', d => {
                if(d === 'start') run();
                if(d === 'ding') play();
                if(typeof d === 'number') { sc = d; document.getElementById('score').innerText = sc; }
            });
        }

        function up() {
            const n = conns.size + 1;
            document.getElementById('count').innerText = n;
            if(isH) document.getElementById('startBtn').style.display = (n === 3) ? 'block' : 'none';
        }

        function sendAll(m) {
            conns.forEach(c => c.send(m));
            if(isH && m === 'start') run();
        }

        function run() {
            sc = 0; active = true; go('game');
            if(isH) {
                let t = 60;
                const timer = setInterval(() => {
                    t--;
                    document.getElementById('timer').innerText = t + "s";
                    if(t <= 0) { clearInterval(timer); active = false; alert("完結！分數: " + sc); location.reload(); }
                }, 1000);
                loop();
            }
        }

        function loop() {
            if(!active) return;
            setTimeout(() => {
                if(!active) return;
                const all = [p.id, ...Array.from(conns.keys())];
                const tar = all[Math.floor(Math.random() * all.length)];
                if(tar === p.id) play(); else conns.get(tar).send('ding');
                loop();
            }, 2000 + Math.random() * 2000);
        }

        function play() {
            const a = document.getElementById('snd');
            a.currentTime = 0; a.play();
            last = Date.now();
            document.getElementById('game-area').style.background = "#ffcc00";
            setTimeout(() => document.getElementById('game-area').style.background = "#333", 200);
        }

        function tap() {
            if(!active) return;
            if(Date.now() - last < 1200) sc++; else sc--;
            document.getElementById('score').innerText = sc;
            sendAll(sc);
        }

        function go(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
