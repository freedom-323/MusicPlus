<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad 遊戲診斷版</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: -apple-system, system-ui; text-align: center; background: #000; color: #fff; margin: 0; }
        .screen { display: none; height: 100vh; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }
        button { padding: 18px; font-size: 1.2rem; cursor: pointer; margin: 10px; border-radius: 12px; border: none; background: #007bff; color: white; width: 250px; }
        input { padding: 12px; font-size: 1.1rem; margin: 8px; width: 220px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; text-align: center; }
        #debug-log { position: fixed; bottom: 0; width: 100%; font-size: 12px; color: #ff3b30; background: rgba(0,0,0,0.8); padding: 5px; height: 40px; overflow: hidden; }
        .score-box { font-size: 2rem; color: #ffcc00; margin: 10px; }
        #game-area { width: 85%; height: 50vh; background: #333; display: flex; justify-content: center; align-items: center; border-radius: 20px; font-size: 2rem; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <h1>三機協作遊戲</h1>
        <input type="text" id="room-id" placeholder="頻道名稱">
        <input type="password" id="room-pw" placeholder="密碼">
        <button onclick="startConnection()">開始連線</button>
        <p id="status-text">請輸入名稱及密碼</p>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 id="room-header">頻道中</h2>
        <p style="font-size: 1.5rem;">連線人數: <span id="member-count">1</span> / 3</p>
        <p id="role-display" style="color: #00ff00;">連線中...</p>
        <button id="start-btn" onclick="broadcast('start-game')" style="display:none; background: #28a745;">全員開始</button>
        <button onclick="location.reload()">重新整理</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer-val">時間: 60s</div>
        <div class="score-box">分數: <span id="score-val">0</span></div>
        <div id="game-area" onclick="handleTap()">點擊此處</div>
    </div>

    <div id="result-screen" class="screen">
        <h1>遊戲結束</h1>
        <p class="score-box">最終分數: <span id="final-score">0</span></p>
        <button onclick="broadcast('reset-game')">回到大廳</button>
    </div>

    <div id="debug-log">系統日誌：等待連線...</div>
    <audio id="ding-sound" src="https://actions.google.com"></audio>

    <script>
        let peer, connMap = new Map(), isHost = false, score = 0, gameActive = false, lastDingTime = 0;
        let roomTargetId = "";

        function log(msg) {
            document.getElementById('debug-log').innerText = "日誌：" + msg;
            console.log(msg);
        }

        function startConnection() {
            const name = document.getElementById('room-id').value;
            const pw = document.getElementById('room-pw').value;
            if(!name || !pw) return alert("請輸入資訊");
            
            roomTargetId = `hdk-game-${name}-${pw}`;
            log("初始化 PeerJS...");

            // iPad Safari 優化配置
            peer = new Peer({
                debug: 2,
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', (id) => {
                log("已取得 ID: " + id);
                tryJoin();
            });

            peer.on('error', (err) => {
                log("錯誤代碼: " + err.type);
                if(err.type === 'unavailable-id') {
                    log("ID 已被佔用，請換個名稱。");
                }
            });
        }

        function tryJoin() {
            log("嘗試連接房主...");
            const conn = peer.connect(roomTargetId);
            
            const timeout = setTimeout(() => {
                if (connMap.size === 0) {
                    log("找不到房主，切換為房主模式...");
                    peer.destroy();
                    setupAsHost();
                }
            }, 3000);

            conn.on('open', () => {
                clearTimeout(timeout);
                log("成功連上房主！");
                isHost = false;
                setupConn(conn);
                showScreen('lobby-screen');
                document.getElementById('role-display').innerText = "你是成員";
            });
        }

        function setupAsHost() {
            peer = new Peer(roomTargetId, {
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });
            peer.on('open', () => {
                log("房主模式啟動成功");
                isHost = true;
                showScreen('lobby-screen');
                document.getElementById('role-display').innerText = "你是房主";
                peer.on('connection', setupConn);
            });
            peer.on('error', (err) => {
                log("房主啟動失敗: " + err.type);
                alert("此頻道可能剛被關閉，請等 5 秒後再試，或更換名稱。");
            });
        }

        function setupConn(conn) {
            connMap.set(conn.peer, conn);
            updateLobby();
            conn.on('data', data => {
                if(data === 'start-game') startGame();
                if(data === 'reset-game') showScreen('lobby-screen');
                if(data === 'ding') playDing();
                if(typeof data === 'number') { score = data; document.getElementById('score-val').innerText = score; }
            });
        }

        function updateLobby() {
            const c = connMap.size + 1;
            document.getElementById('member-count').innerText = c;
            if(isHost) document.getElementById('start-btn').style.display = (c === 3) ? "block" : "none";
        }

        function broadcast(msg) {
            connMap.forEach(c => c.send(msg));
            if(isHost) {
                if(msg === 'start-game') startGame();
                if(msg === 'reset-game') showScreen('lobby-screen');
            }
        }

        function startGame() {
            score = 0; gameActive = true;
            showScreen('game-screen');
            if(isHost) {
                let timeLeft = 60;
                const timer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer-val').innerText = "時間: " + timeLeft + "s";
                    if(timeLeft <= 0) { clearInterval(timer); gameActive = false; endGame(); }
                }, 1000);
                gameLoop();
            }
        }

        function gameLoop() {
            if(!gameActive) return;
            setTimeout(() => {
                if(!gameActive) return;
                const all = [peer.id, ...Array.from(connMap.keys())];
                const target = all[Math.floor(Math.random() * all.length)];
                if(target === peer.id) playDing(); else connMap.get(target).send('ding');
                gameLoop();
            }, 2000 + Math.random() * 2000);
        }

        function playDing() {
            const audio = document.getElementById('ding-sound');
            audio.currentTime = 0;
            audio.play();
            lastDingTime = Date.now();
            document.getElementById('game-area').style.background = "#ffcc00";
            setTimeout(() => document.getElementById('game-area').style.background = "#333", 200);
        }

        function handleTap() {
            if(!gameActive) return;
            if(Date.now() - lastDingTime < 1500) score++; else score--;
            document.getElementById('score-val').innerText = score;
            broadcast(score);
        }

        function endGame() {
            document.getElementById('final-score').innerText = score;
            showScreen('result-screen');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
